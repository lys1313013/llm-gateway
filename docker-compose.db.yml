services:
  postgres:
    image: postgres:15-alpine
    container_name: llm_gateway_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-llm_gateway}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      llm_gateway_net:
        aliases:
          - postgres

volumes:
  postgres_data:

networks:
  llm_gateway_net:
    name: llm-gateway-net
