# LLM Gateway — Go-only deployment.
#
# Use this file if you only want the Go backend (no legacy Python image).
# Mirrors the structure of docker-compose.yml but with just the Go service
# (and the frontend).
#
#   docker-compose -f docker-compose.db.yml -f docker-compose.go.yml up -d
#
# Requires docker-compose.db.yml to be running (PostgreSQL).

services:
  backend-go:
    image: ghcr.io/lys1313013/llm-gateway-backend-go:latest
    container_name: llm_gateway_backend_go
    networks:
      default:
        aliases:
          - backend
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-llm_gateway}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_TIMEZONE: ${DB_TIMEZONE:-Asia/Shanghai}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-to-a-random-secret-string}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${BACKEND_HOST_PORT:-33352}:5001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  frontend:
    image: ghcr.io/lys1313013/llm-gateway-frontend:latest
    container_name: llm_gateway_frontend
    ports:
      - "${FRONTEND_HOST_PORT:-33380}:80"
    restart: always

networks:
  default:
    name: llm-gateway
