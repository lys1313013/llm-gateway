# LLM Gateway — unified docker-compose
#
# Single Go backend serves both the OpenAI and Anthropic protocol surfaces,
# talks to the shared PostgreSQL container (docker-compose.db.yml), and binds
# to host port 33352 by default.

services:
  # ---------------------------------------------------------------------------
  # Go backend — image: ghcr.io/<owner>/llm-gateway-backend
  # Listens on container port 5001, which the frontend nginx proxies to.
  # ---------------------------------------------------------------------------
  backend:
    image: ghcr.io/lys1313013/llm-gateway-backend:latest
    container_name: llm_gateway_backend
    networks:
      default:
        aliases:
          - backend
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-llm_gateway}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_TIMEZONE: ${DB_TIMEZONE:-Asia/Shanghai}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-to-a-random-secret-string}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SESSION_ID_HEADERS: ${SESSION_ID_HEADERS:-X-Claude-Code-Session-Id,X-Agent-Session-Id}
    ports:
      - "${BACKEND_HOST_PORT:-33352}:5001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    healthcheck:
      test: ["CMD", "/app/gateway", "-version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Frontend — image: ghcr.io/<owner>/llm-gateway-frontend
  # The Vite dev server inside the container listens on 80.
  # For dev mode, run `pnpm dev` on the host (port 18888) instead of using
  # this container — see README.
  #
  # nginx.conf proxies /api and /v1 to host `backend:5001`.
  # ---------------------------------------------------------------------------
  frontend:
    image: ghcr.io/lys1313013/llm-gateway-frontend:latest
    container_name: llm_gateway_frontend
    ports:
      - "${FRONTEND_HOST_PORT:-33380}:80"
    restart: always

networks:
  default:
    name: llm-gateway
