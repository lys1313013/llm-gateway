services:
  postgres:
    image: postgres:15-alpine
    container_name: llm_gateway_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mock_openai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    image: ghcr.io/lys1313013/llm-gateway-backend:latest
    container_name: llm_gateway_backend
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: mock_openai
      DB_USER: postgres
      DB_PASSWORD: password
      DB_TIMEZONE: Asia/Shanghai
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    image: ghcr.io/lys1313013/llm-gateway-frontend:latest
    container_name: llm_gateway_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
