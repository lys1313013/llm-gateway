services:
  backend:
    image: ghcr.io/lys1313013/llm-gateway-backend:latest
    container_name: llm_gateway_backend
    environment:
      FLASK_DEBUG: "false"
      # DB 独立运行在 docker-compose.db.yml 中，通过宿主机端口对外暴露。
      # 容器内访问宿主机：
      #   - macOS/Windows: host.docker.internal（默认）
      #   - Linux: 需在 extra_hosts 中加 host.docker.internal:host-gateway，或改为宿主机 IP
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-llm_gateway}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_TIMEZONE: ${DB_TIMEZONE:-Asia/Shanghai}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-to-a-random-secret-string}
    ports:
      - "${BACKEND_HOST_PORT:-33351}:5001"
    restart: always

  frontend:
    image: ghcr.io/lys1313013/llm-gateway-frontend:latest
    container_name: llm_gateway_frontend
    ports:
      - "${FRONTEND_HOST_PORT:-33380}:80"
    depends_on:
      - backend
    restart: always
